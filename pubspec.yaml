# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.2
  sizer: ^2.0.15
  get: ^4.6.6
  google_fonts: ^6.1.0
  pin_code_fields: ^8.0.1
  overlapping_avatar: ^1.0.0
  overlay_group_avatar: ^0.0.4
  awesome_dialog: ^3.2.0
  dotted_border: ^2.1.0
  flutter_quill: ^9.3.1
  image_picker: ^1.0.7
  fluttertoast: ^8.2.4
  http: ^1.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0


flutter:

  uses-material-design: true

  assets:
    - assets/images/



